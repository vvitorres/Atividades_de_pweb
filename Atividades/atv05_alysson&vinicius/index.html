    // Função que carrega o conteúdo de um arquivo HTML para dentro da div principal
    async function carregarConteudo(pagina) {
    const container = document.getElementById('conteudo');
    
    try {
        // Busca o arquivo HTML (ex: 'curriculo_aluno1.html')
        const resposta = await fetch(pagina);
        
        // Verifica se o arquivo foi encontrado
        if (!resposta.ok) throw new Error('Página não encontrada');
        
        // Converte o resultado em texto
        const html = await resposta.text();
        
        // Injeta o HTML dentro da div principal
        container.innerHTML = html;
        
    } catch (erro) {
        container.innerHTML = "<h1>Erro 404</h1><p>Conteúdo não encontrado.</p>";
    }
}

    function temas() {
    const body = document.getElementById("corpo");

    body.classList.toggle("temaa");
    body.classList.toggle("temav");

    if (document.getElementById('botao-tema').textContent == "Tema A") document.getElementById('botao-tema').textContent = "Tema V";
    else document.getElementById('botao-tema').textContent = "Tema A";
}

    function myFunction(ativo, ativo2) {
        
        var y = document.getElementsByClassName("texto");
        var x = document.getElementsByClassName("botoes");
        for (var i = 0; i < x.length; i++) {
            
            x[i].style.backgroundColor = "#2d0000";
            y[i].style.color = "#B0B0B0";
        }
        document.getElementById(ativo).style.backgroundColor='#FFD700';
        document.getElementById(ativo2).style.color='black';
    }

    function mostrarBotoes(id) {
        document.getElementById(id).hidden = !document.getElementById(id).hidden;
    }

    </script>
