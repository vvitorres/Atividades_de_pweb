<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script> 
        function testes(adicionar) {
            if (adicionar) document.getElementById('aqui').innerHTML = '<button style="width: 1000px; height: 500px;">teste</button>';
            else document.getElementById('aqui').innerHTML = '';
        }
    </script>
</head>
<body>

    
    <a onmouseover="testes(true)" onmouseout="testes(false)">testes testes<a>
    <div style="background-color: blue;" id="aqui" onmouseover="testes(true)" onmouseout="testes(false)"></div>
</body>
</html>
