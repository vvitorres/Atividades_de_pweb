        .meu_container { /*classe*/
            width: 65%; /*Ajeita a largura total do div do corpo*/
            height: 950px; /*Ajeita a altura total do div do corpo*/
            margin-top: 30px; /*colocar uma margem no topo*/
            margin: auto; /*Deixa a margem uniforme (tudo centralizado)*/
            background-color: rgb(245, 245, 236); /*Muda o plano de fundo do div do corpo*/
        }
        .meu_container div{ /*classe*/
            text-align: center; /*Alinha todo o texto no centro*/
            overflow: hidden; /* Corta qualquer conteúdo que passe do tamanho da div */
        }
        #cabecalho { /*id*/
            font-size: 300%; /*Aumenta o tamanho da fonte*/
            color: #FFD700; /*Muda a cor do texto do cabeçalho*/
            background-color: #1a1a1a; /*Muda a cor do plano de fundo do cabeçalho*/
            height: 80px; /*Ajeita a altura total do cabeçalho*/
        }
        .grade { /*classe*/
            display: grid; /*Organiza os elementos em uma grade*/
            grid-template-columns: 15% 85%; /*Cria uma coluna com 15% do espaço e outra com 85%*/
        }
        .barra_lateral { /*classe*/
            background-color: #2d0000; /*Muda a cor do plano de fundo da barra lateral*/
            height: 800px;  /*Ajeita a altura total da barra lateral*/
        }
        .barra_lateral div { /*classe*/
            vertical-align: top; /*Alinha o conteúdo do div ao topo*/
        }
        #aba-curriculo { /*id*/
            background-color:#FFD700; /*Muda a cor do plano de fundo do botão currículo*/
        }
        #texto-curriculo { /*id*/
            color: black; /*Muda a cor do texto do botão currículo*/

        }
        #texto-hobbies { /*id*/
            color: #B0B0B0; /*Muda a cor do texto do botão hobbies*/
        }
        #conteudo { /*id*/
            margin: auto; /*Deixa a margem uniforme (tudo centralizado)*/
            width: 100%; /*Deixa a largura do conteúdo em 100%*/
        }
        #rodape { /*id*/
            background-color: #1a1a1a; /*Muda a cor do plano de fundo do rodapé*/
            color: #E0E0E0; /*Muda a cor da fonte do rodapé*/
            height: 70px; /*Ajeita a altura total do rodapé*/
        }
    </style>
