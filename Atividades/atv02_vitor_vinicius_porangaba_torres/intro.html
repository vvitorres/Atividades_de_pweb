<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela formatada</title>
    <style>
    table, tr, th{
    border: 1px solid black;
    border-collapse: collapse;
    }
    table{
        margin: auto;
        margin-top: 50px;
     }
    </style>
</head>
<body>
    <table style="width: 50%; height: 840px;">
        <tr>
            <th colspan="2" style="height: 150px;">Cabeçalho</th>
        </tr>
        <tr>
            <th style="width: 15%;">Barra lateral</th>
            <th>Conteúdo</th>
        </tr>
        <tr>
            <th colspan="2" style="height: 100px">Rodapé</th>
        </tr>
    </table>
    
</body>
</html>
